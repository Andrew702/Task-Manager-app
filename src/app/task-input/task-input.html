<div class="container-sm border border-dark shadow rounded mb-3">
  <div class="row m-2">
    <h2>Add Task</h2>
  </div>

  <div class="row m-2">
    <div class="col-3">
      <input
        class="form-control m-2"
        type="text"
        [(ngModel)]="CurrTask.tasktitle"
        name="Tasktitle"
        placeholder="Task Title"
      />
    </div>
    <div class="col-9">
      <input
        class="form-control m-2"
        type="text"
        [(ngModel)]="CurrTask.taskdescription"
        name="Taskdescription"
        placeholder="Task Description"
      />
    </div>
  </div>
  <div class="row text-center mx-2">
    <div class="col-4 my-2">
      <label for="taskPriority" class="form-label">Task Priority</label>
      <select
        name="TaskPrioritySelector"
        class="form-select"
        [(ngModel)]="CurrTask.taskpriority"
        id="taskPriority"
      >
        <option value="" disabled>Task Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>
    <div class="col-4 my-2">
      <div class="row text-center">
        <label for="DueDate" class="form-label">Due Date</label>
        <input
          type="date"
          name="DueDate"
          class="form-control"
          [(ngModel)]="CurrTask.taskduedate"
          id="DueDate"
        />
      </div>
    </div>
    <div class="col-4 my-2">
      <label for="Category" class="form-label">Category</label>
      <select name="Category" class="form-select" id="Category" [(ngModel)]="CurrTask.taskcategory">
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Study">Study</option>
      </select>
    </div>
    <div class="text-cetner mb-2">
      <button class="btn btn-primary col-2" (click)="AddTask()">Add Task</button>
    </div>
  </div>
</div>
