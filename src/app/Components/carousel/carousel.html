<div class="container-sm border border-dark rounded shadow p-2 mb-3">
  <div class="row align-items-center text-center justify-content-center mb-3">
    <button class="btn btn-dark btn-lg col-1" (click)="goprevious(true)">&lt;</button>
    <div class="col-4">
      <img [src]="imgs[currentindex()]" class="w-100" />
    </div>
    <button class="btn btn-dark btn-lg col-1" (click)="gonext(true)">&gt;</button>
  </div>
  <div class="row justify-content-center text-center">
    <div class="col-6 mb-3">
      @for (img of imgs; track img) {
        <img
          src="imgs/radio_off.webp"
          (click)="goindex($index)"
          width="25"
          height="25"
          [style]="this.currentindex() == $index ? radioselectedstyle : 'none'"
        />
      }
    </div>
  </div>
</div>
