<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        text-align: center;
      }

      .container {
        padding: 2rem;
      }

      .code {
        font-size: 96px;
        font-weight: 700;
        letter-spacing: -4px;
        color: #111;
        line-height: 1;
      }

      .code span {
        color: #ccc;
      }

      .divider {
        width: 40px;
        height: 2px;
        background: #ddd;
        margin: 1.5rem auto;
      }

      h1 {
        font-size: 18px;
        font-weight: 500;
        color: #111;
        margin-bottom: 8px;
      }

      p {
        font-size: 14px;
        color: #888;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 10px 24px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        text-decoration: none;
        color: #111;
      }

      a:hover {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="code">4<span>0</span>4</p>
      <div class="divider"></div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/main">Go back home</a>
    </div>
  </body>
</html>
