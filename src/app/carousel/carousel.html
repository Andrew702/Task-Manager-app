<div class="container-fluid">
  <div class="row align-items-center text-center justify-content-center">
    <div class="col-1">
      <img src="imgs/arrowleft.jpg" (click)="goprevious()" width="50" height="50" alt="" />
    </div>
    <div class="col-4">
      <img
        [src]="imgs[currentindex]"
        class="img-fluid"
        width="350"
        height="350"
        style="border: solid 10px black"
        alt=""
      />
    </div>
    <div class="col-1">
      <img src="imgs/arrowright.jpg" (click)="gonext()" width="50" height="50" alt="" />
    </div>
  </div>
  <div class="row justify-content-center text-center">
    <div class="col-6">
      <img
        src="imgs/radio_off.webp"
        (click)="goindex(0)"
        width="25"
        height="25"
        alt=""
        [style]="this.currentindex == 0 ? radioselectedstyle : 'none'"
      />
      <img
        src="imgs/radio_off.webp"
        (click)="goindex(1)"
        width=""
        height="25"
        alt=""
        [style]="this.currentindex == 1 ? radioselectedstyle : 'none'"
      />

      <img
        src="imgs/radio_off.webp"
        (click)="goindex(2)"
        width="25"
        height="25"
        alt=""
        [style]="this.currentindex == 2 ? radioselectedstyle : 'none'"
      />
    </div>
  </div>
  <div class="row justify-content-center text-center">
    <div class="col-1"><button (click)="StartSlideShow()">SlideShow</button></div>
    <div class="col-1"><button (click)="StopSlideShow()">Stop</button></div>
  </div>
</div>
